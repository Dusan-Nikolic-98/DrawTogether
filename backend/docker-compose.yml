version: "3.8"
services:
  backend:
    build: ./backend
    container_name: chat-backend-test-novi
    ports:
      - "3001:3001"
    depends_on:
      - db

  db:
    image: postgres:14
    container_name: chat-db-test-novi
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatapp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
